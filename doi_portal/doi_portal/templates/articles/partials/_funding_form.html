{% load i18n %}
<div class="card border-primary mb-3">
    <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
        <h6 class="mb-0">Dodaj finansijera</h6>
        <button type="button" class="btn btn-sm btn-light"
                onclick="document.getElementById('funding-form-container').innerHTML = '';">
            <i class="bi bi-x-lg"></i>
        </button>
    </div>
    <div class="card-body">
        <form hx-post="{% url 'articles:funding-add' article_pk=article.pk %}"
              hx-target="#funding-section-content"
              hx-swap="innerHTML">
            {% csrf_token %}

            <div class="row" x-data="autocompleteSearch('{% url 'articles:funder-search' %}')"
                 @autocomplete-selected.stop="
                    document.getElementById('id_funder_name').value = $event.detail.name;
                    document.getElementById('id_funder_doi').value = $event.detail.doi || '';
                 ">
                <div class="col-md-5 mb-2">
                    <label for="id_funder_name" class="form-label">
                        {{ funding_form.funder_name.label }} <span class="text-danger">*</span>
                    </label>
                    <div class="position-relative">
                        {{ funding_form.funder_name }}
                        <div class="position-absolute w-100 bg-white border rounded shadow-sm mt-1"
                             style="z-index: 1050; max-height: 250px; overflow-y: auto;"
                             x-show="isOpen" x-cloak
                             @click.outside="close()">
                            <template x-for="(item, idx) in results" :key="idx">
                                <div class="px-3 py-2 border-bottom"
                                     style="cursor: pointer;"
                                     @click="select(item)">
                                    <div class="fw-semibold" x-text="item.name"></div>
                                    <small class="text-muted" x-text="item.location || ''"></small>
                                </div>
                            </template>
                        </div>
                    </div>
                    {% if funding_form.funder_name.errors %}
                    <div class="invalid-feedback d-block">{{ funding_form.funder_name.errors.0 }}</div>
                    {% endif %}
                    <script>
                        // Wire up autocomplete — runs immediately since this partial is HTMX-injected after Alpine boot
                        (function() {
                            document.querySelectorAll('#funding-form-container [x-data]').forEach(el => {
                                if (!el._x_dataStack) Alpine.initTree(el);
                            });
                            const funderInput = document.getElementById('id_funder_name');
                            if (funderInput) {
                                funderInput.addEventListener('input', (e) => {
                                    const component = Alpine.$data(funderInput.closest('[x-data]'));
                                    if (component) {
                                        component.query = e.target.value;
                                        component.search();
                                    }
                                });
                            }
                        })();
                    </script>
                </div>
                <div class="col-md-4 mb-2">
                    <label for="id_funder_doi" class="form-label">{{ funding_form.funder_doi.label }}</label>
                    {{ funding_form.funder_doi }}
                </div>
                <div class="col-md-3 mb-2">
                    <label for="id_award_number" class="form-label">{{ funding_form.award_number.label }}</label>
                    {{ funding_form.award_number }}
                </div>
            </div>

            {{ funding_form.funder_ror_id.as_hidden }}

            <div class="d-flex justify-content-end gap-2 mt-2">
                <button type="button" class="btn btn-sm btn-outline-secondary"
                        onclick="document.getElementById('funding-form-container').innerHTML = '';">
                    Otkaži
                </button>
                <button type="submit" class="btn btn-sm btn-primary">
                    <i class="bi bi-check-lg me-1"></i>Sačuvaj finansijera
                </button>
            </div>
        </form>
    </div>
</div>
