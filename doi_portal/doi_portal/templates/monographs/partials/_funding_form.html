{% load i18n %}
<div class="card border-primary mb-3">
    <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
        <h6 class="mb-0">Dodaj finansijera</h6>
        <button type="button" class="btn btn-sm btn-light"
                onclick="document.getElementById('funding-form-container').innerHTML = '';">
            <i class="bi bi-x-lg"></i>
        </button>
    </div>
    <div class="card-body">
        <form hx-post="{% url 'monographs:funding-add' monograph_pk=monograph.pk %}"
              hx-target="#funding-section-content"
              hx-swap="innerHTML">
            {% csrf_token %}

            <div class="row">
                <div class="col-md-5 mb-2">
                    <label for="id_funder_name" class="form-label">
                        {{ funding_form.funder_name.label }} <span class="text-danger">*</span>
                    </label>
                    {{ funding_form.funder_name }}
                    {% if funding_form.funder_name.errors %}
                    <div class="invalid-feedback d-block">{{ funding_form.funder_name.errors.0 }}</div>
                    {% endif %}
                </div>
                <div class="col-md-4 mb-2">
                    <label for="id_funder_doi" class="form-label">{{ funding_form.funder_doi.label }}</label>
                    {{ funding_form.funder_doi }}
                </div>
                <div class="col-md-3 mb-2">
                    <label for="id_award_number" class="form-label">{{ funding_form.award_number.label }}</label>
                    {{ funding_form.award_number }}
                </div>
            </div>

            {{ funding_form.funder_ror_id.as_hidden }}

            <div class="d-flex justify-content-end gap-2 mt-2">
                <button type="button" class="btn btn-sm btn-outline-secondary"
                        onclick="document.getElementById('funding-form-container').innerHTML = '';">
                    Otkaži
                </button>
                <button type="submit" class="btn btn-sm btn-primary">
                    <i class="bi bi-check-lg me-1"></i>Sačuvaj finansijera
                </button>
            </div>
        </form>
    </div>
</div>
