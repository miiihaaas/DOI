{% load i18n %}
<div id="chapter-{{ chapter.pk }}-relation-container">
    {% for relation in relations %}
    <div class="d-flex align-items-center gap-2 mb-2 p-2 border rounded" data-relation-id="{{ relation.pk }}">
        <i class="bi bi-grip-vertical text-muted" style="cursor: grab;"></i>
        <div class="flex-grow-1">
            <span class="badge bg-info text-dark">{{ relation.relationship_type }}</span>
            <span class="text-muted mx-1">&rarr;</span>
            <span class="fw-semibold">{{ relation.target_identifier }}</span>
            <small class="text-muted">({{ relation.get_identifier_type_display }})</small>
            {% if relation.description %}
            <br><small class="text-muted fst-italic">{{ relation.description }}</small>
            {% endif %}
        </div>
        <button type="button" class="btn btn-sm btn-outline-danger"
                hx-post="{% url 'monographs:chapter-relation-delete' pk=relation.pk %}"
                hx-target="#chapter-{{ chapter.pk }}-relations"
                hx-swap="innerHTML"
                hx-confirm="Obrisati relaciju?">
            <i class="bi bi-trash"></i>
        </button>
    </div>
    {% empty %}
    <div class="text-muted text-center py-2">
        Nema relacija za ovo poglavlje.
    </div>
    {% endfor %}
</div>
