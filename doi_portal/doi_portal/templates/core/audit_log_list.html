{% extends "admin_base.html" %}

{% block title %}Revizioni log - DOI Portal{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h1 class="h3 mb-0"><i class="bi bi-clock-history me-2"></i>Revizioni log</h1>
</div>

<!-- Filter form -->
<div class="card mb-4">
    <div class="card-body">
        <form method="get" action="{% url 'core:audit-log-list' %}" id="filter-form">
            <div class="row g-3">
                <div class="col-md-2">
                    <label for="date_from" class="form-label">Datum od</label>
                    <input type="date" class="form-control" id="date_from" name="date_from"
                           value="{{ filter_date_from }}">
                </div>
                <div class="col-md-2">
                    <label for="date_to" class="form-label">Datum do</label>
                    <input type="date" class="form-control" id="date_to" name="date_to"
                           value="{{ filter_date_to }}">
                </div>
                <div class="col-md-2">
                    <label for="actor" class="form-label">Korisnik</label>
                    <select class="form-select" id="actor" name="actor">
                        <option value="">Svi korisnici</option>
                        {% for user in users %}
                        <option value="{{ user.pk }}" {% if filter_actor == user.pk|stringformat:"d" %}selected{% endif %}>
                            {{ user.email }}
                        </option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-2">
                    <label for="action" class="form-label">Akcija</label>
                    <select class="form-select" id="action" name="action">
                        <option value="">Sve akcije</option>
                        {% for value, label in action_choices %}
                        <option value="{{ value }}" {% if filter_action == value|stringformat:"d" %}selected{% endif %}>
                            {{ label }}
                        </option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-2">
                    <label for="model" class="form-label">Model</label>
                    <select class="form-select" id="model" name="model">
                        <option value="">Svi modeli</option>
                        {% for ct in content_types %}
                        <option value="{{ ct.pk }}" {% if filter_model == ct.pk|stringformat:"d" %}selected{% endif %}>
                            {{ ct.model|title }}
                        </option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-2">
                    <label for="object_id" class="form-label">Object ID</label>
                    <input type="text" class="form-control" id="object_id" name="object_id"
                           value="{{ filter_object_id }}">
                </div>
            </div>
            <div class="row g-3 mt-1">
                <div class="col-md-6">
                    <label for="search-input" class="form-label">Pretraga</label>
                    <input type="text" class="form-control" id="search-input" name="q"
                           value="{{ search_query }}"
                           placeholder="Pretraži po objektu ili korisniku..."
                           hx-get="{% url 'core:audit-log-list' %}"
                           hx-trigger="keyup changed delay:300ms"
                           hx-target="#audit-log-table"
                           hx-include="#filter-form">
                </div>
                <div class="col-md-6 d-flex align-items-end">
                    <button type="submit" class="btn btn-primary me-2">
                        <i class="bi bi-funnel me-1"></i>Filtriraj
                    </button>
                    <a href="{% url 'core:audit-log-list' %}" class="btn btn-outline-secondary">
                        <i class="bi bi-x-circle me-1"></i>Poništi filtere
                    </a>
                </div>
            </div>
        </form>
    </div>
</div>

<!-- Table -->
<div class="card">
    <div class="card-body">
        {% include "core/partials/_audit_log_table.html" %}
    </div>
</div>
{% endblock %}
