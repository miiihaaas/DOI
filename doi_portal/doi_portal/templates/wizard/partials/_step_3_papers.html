<div class="card">
    <div class="card-header d-flex justify-content-between align-items-center">
        <h5 class="mb-0">
            <i class="bi bi-file-earmark-text me-2"></i>Radovi
        </h5>
        <button type="button" class="btn btn-sm btn-primary"
                hx-get="{% url 'wizard:paper-add' publication.pk %}"
                hx-target="#paper-form-container"
                hx-swap="innerHTML">
            <i class="bi bi-plus-lg me-1"></i>Dodaj rad
        </button>
    </div>
    <div class="card-body">
        <div id="paper-form-container"></div>

        <div id="paper-list">
            {% include "wizard/partials/_paper_list.html" %}
        </div>

        <div class="d-flex justify-content-between mt-4">
            <a href="{% url 'wizard:conference-step-2' publication.pk %}" class="btn btn-outline-secondary">
                <i class="bi bi-arrow-left me-1"></i> Nazad
            </a>
            <a href="{% url 'wizard:conference-step-4' publication.pk %}" class="btn btn-primary">
                Nastavi na pregled <i class="bi bi-arrow-right ms-1"></i>
            </a>
        </div>
    </div>
</div>
